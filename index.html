<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="مراجعة ريان">
<meta name="theme-color" content="#F8F6F1">
<title>مراجعة الأسبوع</title>
<link rel="apple-touch-icon" id="app-icon-link" href="">
<link rel="manifest" id="app-manifest" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F8F6F1; --bg2:#EFECEA; --bg3:#E5E2DC;
  --surface:#FFFFFF; --border:#D8D4CC;
  --text-primary:#1A1714; --text-secondary:#5C574F; --text-muted:#9C9690;
  --work:#1B4F8A; --health:#1A6B3A; --personal:#7A3B8C;
  --invest:#B8621A; --travel:#0E7490; --family:#BE185D; --growth:#4F46E5;
  --main:#1B4F8A; --success:#1A6B3A; --warning:#B8621A; --danger:#C4373A;
  --shadow:0 2px 12px rgba(26,23,20,0.08);
  --radius:16px; --radius-sm:10px;
  --font:'IBM Plex Sans Arabic',sans-serif; --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding-bottom:88px}
.screen.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
@keyframes checkPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Header */
.app-header{background:var(--surface);padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-size:17px;font-weight:700}
.week-label{font-size:11px;color:var(--text-muted);font-family:var(--mono);margin-top:2px}
.header-actions{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.icon-btn:active{transform:scale(.9);background:var(--bg3)}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;cursor:pointer;border:none;background:none;font-family:var(--font);transition:all .15s;position:relative}
.nav-item .nav-icon{font-size:20px}
.nav-item .nav-label{font-size:10px;color:var(--text-muted);font-weight:500}
.nav-item.active .nav-label{color:var(--main)}
.nav-item.active .nav-icon{transform:scale(1.1)}
.nav-item:active{transform:scale(.95)}

/* Home */
.home-content{padding:14px}
.energy-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-label{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.energy-dots{display:flex;gap:7px;align-items:center}
.energy-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all .2s;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-muted)}
.energy-dot.active{background:var(--main);border-color:var(--main);color:white;transform:scale(1.15)}
.energy-text{font-size:12px;color:var(--text-secondary);font-weight:500;margin-right:6px}

.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border);text-align:center}
.stat-num{font-family:var(--mono);font-size:24px;font-weight:500;line-height:1}
.stat-num.danger{color:var(--danger)}
.stat-num.success{color:var(--success)}
.stat-num.warn{color:var(--warning)}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:3px}

/* Section Cards — compact list */
.sections-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.section-card{background:var(--surface);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.section-card:active{transform:scale(.98);box-shadow:none}
.sec-left{display:flex;align-items:center;gap:11px}
.sec-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sec-name{font-size:14px;font-weight:600}
.sec-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.sec-right{display:flex;align-items:center;gap:8px}
.score-pill{font-family:var(--mono);font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.pending-badge{background:var(--danger);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:var(--mono)}
.chevron{font-size:14px;color:var(--text-muted)}

/* Colors per section */
.s-work .sec-icon{background:#EBF1F9} .s-work .score-pill{background:#EBF1F9;color:var(--work)}
.s-health .sec-icon{background:#EBF5EF} .s-health .score-pill{background:#EBF5EF;color:var(--health)}
.s-personal .sec-icon{background:#F3EBF7} .s-personal .score-pill{background:#F3EBF7;color:var(--personal)}
.s-invest .sec-icon{background:#FAF0E6} .s-invest .score-pill{background:#FAF0E6;color:var(--invest)}
.s-travel .sec-icon{background:#E0F2FE} .s-travel .score-pill{background:#E0F2FE;color:var(--travel)}
.s-family .sec-icon{background:#FCE7F3} .s-family .score-pill{background:#FCE7F3;color:var(--family)}
.s-growth .sec-icon{background:#EEF2FF} .s-growth .score-pill{background:#EEF2FF;color:var(--growth)}

.review-btn{width:100%;padding:15px;background:var(--main);color:white;border:none;border-radius:var(--radius);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(27,79,138,.3);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.review-btn:active{transform:scale(.98);box-shadow:none}
.streak-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px}
.streak-num{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--warning)}
.streak-lbl{font-size:11px;color:var(--text-muted);margin-top:1px}

/* FAB */
.fab{position:fixed;bottom:90px;left:18px;width:50px;height:50px;border-radius:50%;background:var(--main);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(27,79,138,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:150}
.fab:active{transform:scale(.9)}

/* Section Detail */
.section-detail{padding:14px}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;flex-shrink:0}
.back-btn:active{transform:scale(.9)}

.subsection{margin-bottom:18px}
.sub-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sub-title{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px}
.add-btn{font-size:12px;color:var(--main);font-weight:600;border:none;background:none;cursor:pointer;padding:3px 8px;border-radius:6px;font-family:var(--font)}
.add-btn:active{background:var(--bg2)}

/* Tasks */
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;animation:slideIn .2s ease}
.task-item.done-item{opacity:.55}
.task-item.done-item .task-text{text-decoration:line-through;color:var(--text-muted)}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center;background:var(--bg2);margin-top:1px}
.task-check.checked{background:var(--success);border-color:var(--success);color:white;font-size:11px;animation:checkPop .3s ease}
.task-text{font-size:14px;color:var(--text-primary);line-height:1.5;flex:1}
.task-meta{font-size:10px;color:var(--text-muted);margin-top:2px}
.task-del{font-size:15px;color:var(--text-muted);cursor:pointer;border:none;background:none;padding:0 3px;flex-shrink:0;transition:color .15s}
.task-del:active{color:var(--danger)}

/* Sub-items (travel nested) */
.sub-task{margin-right:28px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:9px 12px;display:flex;align-items:flex-start;gap:9px}
.sub-task .task-check{width:18px;height:18px;font-size:10px}
.sub-task .task-text{font-size:13px}

/* Score selector */
.score-row{display:flex;gap:7px;margin-top:4px}
.score-btn{width:38px;height:38px;border-radius:9px;border:2px solid var(--border);background:var(--bg2);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font)}
.score-btn.sel{color:white;border-color:transparent;transform:scale(1.08)}
.score-btn:active{transform:scale(.9)}

.goal-area{width:100%;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text-primary);resize:none;outline:none;direction:rtl;transition:border-color .15s}
.goal-area:focus{border-color:var(--main)}
.goal-area::placeholder{color:var(--text-muted)}

/* Health toggles */
.toggle-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:7px;transition:all .15s}
.toggle-item:active{transform:scale(.98)}
.ti-left{display:flex;align-items:center;gap:9px}
.ti-icon{font-size:17px}
.ti-name{font-size:14px;font-weight:500}
.ti-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.toggle{width:42px;height:23px;border-radius:12px;background:var(--bg3);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--success)}
.toggle::after{content:'';position:absolute;width:19px;height:19px;border-radius:50%;background:white;top:2px;right:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(-19px)}

/* Growth tracks */
.growth-track{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;margin-bottom:8px}
.gt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.gt-name{font-size:14px;font-weight:600}
.gt-status{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.status-active{background:#EEF2FF;color:var(--growth)}
.status-waiting{background:#FEF3E2;color:var(--warning)}
.status-planned{background:var(--bg2);color:var(--text-muted)}
.gt-sub{font-size:12px;color:var(--text-muted);line-height:1.4}
.gt-next{font-size:12px;color:var(--text-secondary);margin-top:6px;font-weight:500}

/* Review session */
.review-session{padding:18px 14px}
.prog-bar{display:flex;gap:3px;margin-bottom:22px}
.prog-dot{flex:1;height:3px;border-radius:2px;background:var(--bg3);transition:background .3s}
.prog-dot.done{background:var(--main)}
.q-card{background:var(--surface);border-radius:var(--radius);padding:22px;margin-bottom:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.q-num{font-size:10px;color:var(--text-muted);font-family:var(--mono);margin-bottom:6px}
.q-text{font-size:16px;font-weight:700;color:var(--text-primary);line-height:1.5;margin-bottom:8px}
.q-hint{font-size:12px;color:var(--text-muted);line-height:1.5}
.scale-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:14px}
.scale-btn{width:42px;height:42px;border-radius:9px;border:2px solid var(--border);background:var(--bg2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--mono)}
.scale-btn.sel{background:var(--main);border-color:var(--main);color:white;transform:scale(1.08)}
.scale-btn:active{transform:scale(.9)}
.review-ta{width:100%;min-height:90px;padding:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text-primary);resize:none;outline:none;line-height:1.6;direction:rtl;transition:all .15s;margin-top:12px}
.review-ta:focus{border-color:var(--main);background:var(--surface)}
.review-ta::placeholder{color:var(--text-muted)}
.tri-opts{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.tri-opt{padding:11px 14px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;transition:all .15s;font-family:var(--font);color:var(--text-primary);text-align:right}
.tri-opt.sel{border-color:var(--main);background:#EBF1F9}
.tri-opt:active{transform:scale(.98)}
.nav-btns{display:flex;gap:8px}
.btn-prev{padding:13px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);transition:all .15s}
.btn-next{flex:1;padding:13px;background:var(--main);color:white;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-prev:active,.btn-next:active{transform:scale(.97)}

/* Summary */
.summary-content{padding:14px}
.sum-header{text-align:center;padding:18px 0 20px}
.sum-emoji{font-size:46px;margin-bottom:6px}
.sum-header h2{font-size:21px;font-weight:700}
.sum-header p{font-size:13px;color:var(--text-muted);margin-top:3px}
.scores-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;display:flex;flex-direction:column;align-items:center;gap:4px}
.sc-icon{font-size:20px}
.sc-label{font-size:11px;color:var(--text-muted)}
.sc-score{font-family:var(--mono);font-size:20px;font-weight:500}
.sum-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.sum-block-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.sum-block-text{font-size:14px;color:var(--text-primary);line-height:1.6}
.export-btn{width:100%;padding:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);margin-bottom:8px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.export-btn:active{transform:scale(.98)}
.done-btn{width:100%;padding:15px;background:var(--success);color:white;border:none;border-radius:var(--radius);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(26,107,58,.3)}
.done-btn:active{transform:scale(.98)}

/* History */
.history-content{padding:14px}
.hw-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:9px;cursor:pointer;transition:all .15s}
.hw-card:active{transform:scale(.99)}
.hw-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hw-date{font-size:13px;font-weight:600}
.hw-energy{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.hw-chips{display:flex;gap:6px;flex-wrap:wrap}
.hw-chip{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-weight:600}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,.5);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--surface);border-radius:20px 20px 0 0;padding:18px;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:34px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px}
.modal-input{width:100%;padding:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;color:var(--text-primary);outline:none;direction:rtl;margin-bottom:10px;transition:border-color .15s}
.modal-input:focus{border-color:var(--main);background:var(--surface)}
.chips-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.chip-btn{padding:6px 13px;border-radius:20px;border:2px solid var(--border);background:var(--bg2);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;color:var(--text-secondary)}
.chip-btn.sel{background:var(--main);border-color:var(--main);color:white}
.modal-submit{width:100%;padding:13px;background:var(--main);color:white;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.modal-submit:active{transform:scale(.98)}

.empty-state{text-align:center;padding:20px;color:var(--text-muted);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:6px}
.section-divider{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 8px;margin-top:4px}
</style>

<script>
// Generate PWA icon as PNG via canvas — works on iOS Safari
(function(){
  try {
    var c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    var ctx = c.getContext('2d');

    // Background — warm white
    ctx.fillStyle = '#F4F1EC';
    roundRect(ctx, 0, 0, 512, 512, 110);
    ctx.fill();

    // Subtle inner shadow ring
    ctx.strokeStyle = '#E8E4DC';
    ctx.lineWidth = 3;
    roundRect(ctx, 6, 6, 500, 500, 106);
    ctx.stroke();

    var cx = 256, cy = 256;
    // Four section colors
    var colors = { top:'#1B4F8A', right:'#1A6B3A', bottom:'#7A3B8C', left:'#B8621A' };
    var pts = {
      top:   [cx,      cy-148],
      right: [cx+110,  cy-18 ],
      bottom:[cx,      cy+148],
      left:  [cx-110,  cy-18 ]
    };

    // Draw filled quadrants with slight transparency
    var quads = [
      ['top','right','bottom'],
      ['top','bottom','left']
    ];

    // Draw the diamond outline — thick, clean
    ctx.beginPath();
    ctx.moveTo(pts.top[0],    pts.top[1]);
    ctx.lineTo(pts.right[0],  pts.right[1]);
    ctx.lineTo(pts.bottom[0], pts.bottom[1]);
    ctx.lineTo(pts.left[0],   pts.left[1]);
    ctx.closePath();
    ctx.strokeStyle = '#1B4F8A';
    ctx.lineWidth = 22;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Four colored corner nodes
    var nodes = [
      {pt:pts.top,    col:'#1B4F8A'},
      {pt:pts.right,  col:'#1A6B3A'},
      {pt:pts.bottom, col:'#7A3B8C'},
      {pt:pts.left,   col:'#B8621A'}
    ];
    nodes.forEach(function(n){
      // Glow
      ctx.beginPath();
      ctx.arc(n.pt[0], n.pt[1], 26, 0, Math.PI*2);
      ctx.fillStyle = n.col + '28';
      ctx.fill();
      // Dot
      ctx.beginPath();
      ctx.arc(n.pt[0], n.pt[1], 16, 0, Math.PI*2);
      ctx.fillStyle = n.col;
      ctx.fill();
      // White inner
      ctx.beginPath();
      ctx.arc(n.pt[0], n.pt[1], 7, 0, Math.PI*2);
      ctx.fillStyle = 'white';
      ctx.fill();
    });

    // Center node
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, Math.PI*2);
    ctx.fillStyle = '#1B4F8A18';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 14, 0, Math.PI*2);
    ctx.fillStyle = '#1B4F8A';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI*2);
    ctx.fillStyle = 'white';
    ctx.fill();

    var iconUrl = c.toDataURL('image/png');

    // Set apple-touch-icon
    var link = document.getElementById('app-icon-link');
    if (link) link.href = iconUrl;

    // Generate manifest dynamically
    var manifest = {
      name: 'مراجعة الأسبوع',
      short_name: 'مراجعتي',
      start_url: '.',
      display: 'standalone',
      background_color: '#F8F6F1',
      theme_color: '#F8F6F1',
      orientation: 'portrait',
      icons: [
        { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
        { src: iconUrl, sizes: '192x192', type: 'image/png' }
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    var mLink = document.getElementById('app-manifest');
    if (mLink) mLink.href = URL.createObjectURL(blob);

  } catch(e) { console.log('Icon gen failed:', e); }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }
})();
</script>
</head>

<script>
// ═══════════════════════════════════════════
// CONFIG — all sections
// ═══════════════════════════════════════════
const SECTIONS = [
  { id:'work',     label:'العمل والمهني',      icon:'💼', cls:'s-work',     color:'#1B4F8A', reviewOnly:true  },
  { id:'health',   label:'الصحة والجسد',       icon:'🏃', cls:'s-health',   color:'#1A6B3A', reviewOnly:true  },
  { id:'personal', label:'الشخصي والعلاقات',   icon:'👤', cls:'s-personal', color:'#7A3B8C', reviewOnly:false },
  { id:'invest',   label:'الاستثمار والمالي',  icon:'📈', cls:'s-invest',   color:'#B8621A', reviewOnly:false },
  { id:'travel',   label:'السفر والرحلات',     icon:'🧳', cls:'s-travel',   color:'#0E7490', reviewOnly:false },
  { id:'family',   label:'العائلة والمنزل',    icon:'👨‍👩‍👧‍👦', cls:'s-family',   color:'#BE185D', reviewOnly:false },
  { id:'growth',   label:'النمو الشخصي',       icon:'📚', cls:'s-growth',   color:'#4F46E5', reviewOnly:false }
];

const SCORE_COLORS = {1:'#C4373A',2:'#B8621A',3:'#7A7A1A',4:'#1A6B3A',5:'#1B4F8A'};
const AR = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
const toAr = n => String(n).replace(/\d/g,d=>AR[d]);

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
const SK = 'rayan_v3';
const load = () => { try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}} };
const save = s => localStorage.setItem(SK, JSON.stringify(s));

function weekKey() {
  const d=new Date(), jan1=new Date(d.getFullYear(),0,1);
  const w=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(w).padStart(2,'0')}`;
}

function weekLabel() {
  const d=new Date(), jan1=new Date(d.getFullYear(),0,1);
  const w=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  const mo=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  return `الأسبوع ${toAr(w)} — ${mo[d.getMonth()]} ${d.getFullYear()}`;
}

// Format any ISO date string as readable Gregorian
function fmtDate(iso, opts) {
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', opts||{day:'numeric',month:'short',year:'numeric'});
}
function fmtDateAr(iso) {
  if(!iso) return '—';
  const d=new Date(iso);
  const mo=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  return `${days[d.getDay()]} ${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}`;
}

function getWeek() {
  const state=load(), key=weekKey();
  if (!state[key]) {
    const secs={};
    SECTIONS.forEach(s => {
      secs[s.id]={ score:0, goal:'', done:[], pending:[], followup:[] };
      if (s.id==='health') secs[s.id].checks={sleep:false,zone2:false,fasting:false,caffeine:false};
      if (s.id==='growth') secs[s.id].tracks=[];
    });
    state[key]={ key, energy:0, sections:secs, review:{}, completedAt:null, createdAt:new Date().toISOString() };
    save(state);
  }
  return {state, week:state[key], key};
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-home') refreshHome();
  if(id==='screen-history') renderHistory();
}
function setNav(id) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
const E_LABELS=['','⚠️ منهك','متعب','عادي','جيد 👍','⚡ ممتاز'];

function refreshHome() {
  const {week}=getWeek();
  document.getElementById('week-label').textContent=weekLabel();
  document.getElementById('rev-week').textContent=weekLabel();
  document.getElementById('det-week').textContent=weekLabel();

  // energy
  document.querySelectorAll('#energy-dots .energy-dot').forEach((d,i)=>{
    d.classList.toggle('active',i+1===week.energy);
  });
  document.getElementById('energy-text').textContent=week.energy?E_LABELS[week.energy]:'اختر';

  // stats
  let pend=0,done=0;
  SECTIONS.forEach(s=>{
    pend+=week.sections[s.id]?.pending?.length||0;
    done+=week.sections[s.id]?.done?.length||0;
  });
  document.getElementById('st-pending').textContent=toAr(pend);
  document.getElementById('st-done').textContent=toAr(done);
  const streak=load()._streak||0;
  document.getElementById('st-streak').textContent=toAr(streak);
  document.getElementById('streak-big').textContent=toAr(streak);

  // section cards
  const list=document.getElementById('sections-list');
  list.innerHTML='';

  // Group: Review-only first, then task sections
  const reviewSecs = SECTIONS.filter(s=>s.reviewOnly);
  const taskSecs   = SECTIONS.filter(s=>!s.reviewOnly);

  const buildCard = s => {
    const sec=week.sections[s.id];
    const score=sec?.score||0;
    const pCount=sec?.pending?.length||0;
    const dCount=sec?.done?.length||0;
    const total=pCount+(sec?.followup?.length||0)+dCount;
    let sub = s.reviewOnly ? 'مراجعة أسبوعية فقط' : (total>0?`${toAr(dCount)} منجز · ${toAr(pCount)} متأخر`:'اضغط للمراجعة');
    const card=document.createElement('div');
    card.className=`section-card ${s.cls}`;
    card.onclick=()=>showSection(s.id);
    card.innerHTML=`
      <div class="sec-left">
        <div class="sec-icon">${s.icon}</div>
        <div><div class="sec-name">${s.label}</div><div class="sec-sub">${sub}</div></div>
      </div>
      <div class="sec-right">
        ${pCount>0?`<span class="pending-badge">${toAr(pCount)}</span>`:''}
        <span class="score-pill" style="${score?`color:${SCORE_COLORS[score]};background:${SCORE_COLORS[score]}18`:''}">
          ${score?toAr(score)+'/٥':'—/٥'}
        </span>
        <span class="chevron">›</span>
      </div>`;
    return card;
  };

  // divider helper
  const divider=(txt)=>{const d=document.createElement('div');d.className='section-divider';d.textContent=txt;return d;};
  list.appendChild(divider('مراجعة أسبوعية'));
  reviewSecs.forEach(s=>list.appendChild(buildCard(s)));
  list.appendChild(divider('المتابعة والإنجاز'));
  taskSecs.forEach(s=>list.appendChild(buildCard(s)));

  checkExportReminder();
  // Review button status
  const wk=getWeek().week;
  const navIcon=document.getElementById('nav-rev-icon');
  const navLbl=document.getElementById('nav-rev-label');
  if(navIcon&&navLbl) {
    if(wk.completedAt) { navIcon.textContent='✅'; navLbl.textContent='مكتملة'; }
    else if(wk.reviewDraft&&Object.keys(wk.reviewDraft).length>0) { navIcon.textContent='⏸️'; navLbl.textContent='متابعة'; }
    else { navIcon.textContent='✍️'; navLbl.textContent='مراجعة'; }
  }
}

function setEnergy(v) {
  const {state,week,key}=getWeek(); week.energy=v; state[key]=week; save(state); refreshHome();
}

// ═══════════════════════════════════════════
// SECTION DETAIL
// ═══════════════════════════════════════════
let curSec='work';
function showSection(id) {
  curSec=id;
  const s=SECTIONS.find(x=>x.id===id);
  document.getElementById('det-title').textContent=s.label;
  document.getElementById('det-icon').textContent=s.icon;
  renderDetail(id);
  showScreen('screen-section');
  setNav('');
}

function renderDetail(id) {
  const {week}=getWeek();
  const sec=week.sections[id];
  const s=SECTIONS.find(x=>x.id===id);
  const cont=document.getElementById('det-content');
  let h='';

  // ── Health: toggles ──
  if (id==='health') {
    const checks=sec.checks||{};
    const items=[
      {k:'sleep',icon:'😴',name:'النوم منتظم',sub:'بدون تذبذب'},
      {k:'zone2',icon:'🏃',name:'Zone 2: +١٢٠ دقيقة',sub:'الهدف الأسبوعي'},
      {k:'fasting',icon:'⏱',name:'الصيام ١٦-١٨ ساعة',sub:'ملتزم هذا الأسبوع'},
      {k:'caffeine',icon:'☕',name:'بدون كافيين بعد ٨م',sub:'وبدون توباكو متأخر'}
    ];
    h+=`<div class="subsection"><div class="sub-header"><span class="sub-title">✅ CHECK-INS</span></div>`;
    items.forEach(it=>{
      h+=`<div class="toggle-item" onclick="toggleCheck('${it.k}')">
        <div class="ti-left"><span class="ti-icon">${it.icon}</span><div><div class="ti-name">${it.name}</div><div class="ti-sub">${it.sub}</div></div></div>
        <div class="toggle ${checks[it.k]?'on':''}" id="hc-${it.k}"></div>
      </div>`;
    });
    h+=`</div>`;
    // weekly note
    h+=`<div class="subsection"><div class="sub-header"><span class="sub-title">ملاحظة الأسبوع</span></div>
      <textarea class="goal-area" rows="2" placeholder="كيف كانت صحتك هذا الأسبوع؟" oninput="saveGoal('${id}',this.value)">${esc(sec.goal)}</textarea></div>`;
  }

  // ── Growth: special tracks ──
  else if (id==='growth') {
    const tracks = sec.tracks || getDefaultTracks();
    h+=`<div class="subsection">
      <div class="sub-header"><span class="sub-title">المسارات النشطة</span><button class="add-btn" onclick="addTrack()">+ مسار</button></div>`;
    tracks.forEach((t,i)=>{
      const statusCls = t.status==='active'?'status-active':t.status==='waiting'?'status-waiting':'status-planned';
      const statusLbl = t.status==='active'?'نشط':t.status==='waiting'?'انتظار':'مخطط';
      h+=`<div class="growth-track">
        <div class="gt-header">
          <span class="gt-name">${esc(t.name)}</span>
          <span class="gt-status ${statusCls}">${statusLbl}</span>
        </div>
        <div class="gt-sub">${esc(t.note||'')}</div>
        ${t.next?`<div class="gt-next">الخطوة التالية: ${esc(t.next)}</div>`:''}
      </div>`;
    });
    h+=`</div>`;
    // weekly step
    h+=`<div class="subsection"><div class="sub-header"><span class="sub-title">🎯 خطوة هذا الأسبوع</span></div>
      <textarea class="goal-area" rows="2" placeholder="ما الخطوة الواحدة للنمو هذا الأسبوع؟" oninput="saveGoal('${id}',this.value)">${esc(sec.goal)}</textarea></div>`;
  }

  // ── Work: review-only ──
  else if (id==='work') {
    h+=`<div class="subsection"><div class="sub-header"><span class="sub-title">⚡ الإنجاز الأبرز</span></div>
      <textarea class="goal-area" rows="2" placeholder="الشيء الواحد الأكثر أثراً هذا الأسبوع في العمل..." oninput="saveGoal('${id}',this.value)">${esc(sec.goal)}</textarea></div>
    <div class="subsection"><div class="sub-header"><span class="sub-title">📌 ملاحظة</span><button class="add-btn" onclick="openAdd('done','${id}')">+ إضافة</button></div>`;
    if(!sec.done.length) h+=`<div class="empty-state"><div class="empty-icon">📝</div>لا يوجد</div>`;
    sec.done.forEach((it,i)=>{ h+=taskHtml('done',id,it,i,true); });
    h+=`</div>`;
  }

  // ── Default task sections ──
  else {
    const isSorting = window._sortMode === id;

    // pending
    h+=`<div class="subsection">
      <div class="sub-header">
        <span class="sub-title">🔴 متأخر / يحتاج إنجاز</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${sec.pending.length>1 ? `<button class="sort-btn ${isSorting?'active':''}" onclick="toggleSort('${id}','pending')">${isSorting?'✓ تم':'⇅ ترتيب'}</button>` : ''}
          <button class="add-btn" onclick="openAdd('pending','${id}')">+ إضافة</button>
        </div>
      </div>`;
    if(!sec.pending.length) h+=`<div class="empty-state"><div class="empty-icon">✨</div>لا شيء متأخر</div>`;
    else if(isSorting) {
      h+=`<div id="sort-list-pending" data-sec="${id}" data-type="pending">`;
      sec.pending.forEach((it,i)=>{
        h+=`<div class="task-item sortable" draggable="true" data-idx="${i}" data-type="pending" data-sec="${id}"
          ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)"
          ontouchstart="touchStart(event)" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)">
          <span class="drag-handle">⠿</span>
          <div class="task-text">${esc(it)}</div>
        </div>`;
      });
      h+=`</div>`;
    } else {
      sec.pending.forEach((it,i)=>{ h+=taskHtml('pending',id,it,i,false); });
    }
    h+=`</div>`;

    // followup
    h+=`<div class="subsection">
      <div class="sub-header">
        <span class="sub-title">👁 متابعة</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${sec.followup.length>1 ? `<button class="sort-btn ${window._sortMode===id+'_followup'?'active':''}" onclick="toggleSort('${id}','followup')">${window._sortMode===id+'_followup'?'✓ تم':'⇅ ترتيب'}</button>` : ''}
          <button class="add-btn" onclick="openAdd('followup','${id}')">+ إضافة</button>
        </div>
      </div>`;
    if(!sec.followup.length) h+=`<div class="empty-state" style="padding:10px"><div style="font-size:16px">—</div></div>`;
    else if(window._sortMode===id+'_followup') {
      h+=`<div id="sort-list-followup" data-sec="${id}" data-type="followup">`;
      sec.followup.forEach((it,i)=>{
        h+=`<div class="task-item sortable" draggable="true" data-idx="${i}" data-type="followup" data-sec="${id}"
          ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)"
          ontouchstart="touchStart(event)" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)">
          <span class="drag-handle">⠿</span>
          <div class="task-text">${esc(it)}</div>
        </div>`;
      });
      h+=`</div>`;
    } else {
      sec.followup.forEach((it,i)=>{ h+=taskHtml('followup',id,it,i,false); });
    }
    h+=`</div>`;

    // goal
    h+=`<div class="subsection"><div class="sub-header"><span class="sub-title">🎯 هدف الأسبوع القادم</span></div>
      <textarea class="goal-area" rows="2" placeholder="هدف واحد محدد..." oninput="saveGoal('${id}',this.value)">${esc(sec.goal)}</textarea></div>`;

    // done LAST
    if(sec.done.length>0) {
      h+=`<div class="subsection"><div class="sub-header"><span class="sub-title">✅ منجز (${toAr(sec.done.length)})</span><button class="add-btn" onclick="openAdd('done','${id}')">+ إضافة</button></div>`;
      sec.done.forEach((it,i)=>{ h+=taskHtml('done',id,it,i,true); });
      h+=`</div>`;
    }
  }

  // Score (all sections)
  h+=`<div class="subsection"><div class="sub-header"><span class="sub-title">التقييم الأسبوعي</span></div>
    <div class="score-row">`;
  for(let i=1;i<=5;i++){
    const sel=sec.score===i;
    h+=`<button class="score-btn ${sel?'sel':''}" style="${sel?`background:${SCORE_COLORS[i]};`:''}\"
      onclick="setScore('${id}',${i})">${toAr(i)}</button>`;
  }
  h+=`</div></div>`;

  cont.innerHTML=h;
}

function taskHtml(type,sec,text,idx,isDone) {
  if (isDone) {
    // Done items: check undoes to pending, trash permanently deletes (with confirm)
    return `<div class="task-item done-item" id="task-${type}-${sec}-${idx}">
      <div class="task-check checked" onclick="undoTask('${sec}',${idx})" title="إلغاء الإنجاز">✓</div>
      <div class="task-text">${esc(text)}</div>
      <button class="task-del" onclick="confirmDelete('${sec}',${idx})" title="حذف نهائي">🗑</button>
    </div>`;
  } else {
    // Pending/followup: check completes, X moves to done (not delete)
    const completeAction = type==='pending'
      ? `completeTask('${sec}',${idx})`
      : `moveToSection('${type}','${sec}',${idx},'done')`;
    return `<div class="task-item" id="task-${type}-${sec}-${idx}">
      <div class="task-check" onclick="${completeAction}" title="تحديد كمنجز"></div>
      <div class="task-text">${esc(text)}</div>
      <button class="task-del" onclick="archiveTask('${type}','${sec}',${idx})" title="نقل للمنجز">✓→</button>
    </div>`;
  }
}

function toggleCheck(k) {
  const {state,week,key}=getWeek();
  if(!week.sections.health.checks) week.sections.health.checks={};
  week.sections.health.checks[k]=!week.sections.health.checks[k];
  state[key]=week; save(state);
  const el=document.getElementById(`hc-${k}`);
  if(el) el.classList.toggle('on',week.sections.health.checks[k]);
}

function setScore(id,v) {
  const {state,week,key}=getWeek(); week.sections[id].score=v; state[key]=week; save(state);
  renderDetail(id); refreshHome();
}

function saveGoal(id,v) {
  const {state,week,key}=getWeek(); week.sections[id].goal=v; state[key]=week; save(state);
}

function completeTask(sec,idx) {
  const {state,week,key}=getWeek();
  const item=week.sections[sec].pending.splice(idx,1)[0];
  week.sections[sec].done.push(item);
  state[key]=week; save(state); renderDetail(sec); refreshHome();
}

function removeTask(type,sec,idx) {
  const {state,week,key}=getWeek();
  week.sections[sec][type].splice(idx,1);
  state[key]=week; save(state); renderDetail(sec); refreshHome();
}

// Archive (X button) = move to done, not delete
function archiveTask(type,sec,idx) {
  const {state,week,key}=getWeek();
  const item=week.sections[sec][type].splice(idx,1)[0];
  week.sections[sec].done.unshift(item); // add to top of done
  state[key]=week; save(state); renderDetail(sec); refreshHome();
  showToast('✓ نُقلت للمنجز');
}

// Undo done → back to pending
function undoTask(sec,idx) {
  const {state,week,key}=getWeek();
  const item=week.sections[sec].done.splice(idx,1)[0];
  week.sections[sec].pending.unshift(item);
  state[key]=week; save(state); renderDetail(sec); refreshHome();
  showToast('↩ رُجّعت للمهام');
}

// Permanent delete with confirmation toast
function confirmDelete(sec,idx) {
  const {week}=getWeek();
  const item=week.sections[sec].done[idx];
  // Show undo-delete toast for 4s
  let t=document.getElementById('app-toast');
  const undoFn = 'undoDelete_'+Date.now();
  window[undoFn] = function() {
    clearTimeout(window[undoFn+'_t']);
    showToast('↩ تم الإلغاء');
  };
  // Actually delete after 4s unless undo pressed
  const {state,week:w,key}=getWeek();
  w.sections[sec].done.splice(idx,1);
  state[key]=w; save(state); renderDetail(sec); refreshHome();
  showToastUndo('🗑 تم الحذف', ()=>{
    // restore
    const {state:s2,week:w2,key:k2}=getWeek();
    w2.sections[sec].done.splice(idx,0,item);
    s2[k2]=w2; save(s2); renderDetail(sec); refreshHome();
  });
}

function moveToSection(fromType,sec,idx,toType) {
  const {state,week,key}=getWeek();
  const item=week.sections[sec][fromType].splice(idx,1)[0];
  week.sections[sec][toType].push(item);
  state[key]=week; save(state); renderDetail(sec); refreshHome();
}

function openCapture() {

  buildModalChips('pending','travel');

}

function buildModalChips(selType,selSec) {
  // type chips
  const tc=document.getElementById('type-chips');
  tc.innerHTML=['done','pending','followup'].map(t=>{
    const lbl=t==='done'?'✅ منجز':t==='pending'?'🔴 متأخر':'👁 متابعة';
    return `<button class="chip-btn ${t===selType?'sel':''}" onclick="pickChip(this,'type','${t}')">${lbl}</button>`;

function pickChip(btn,kind,val) {
  if(kind==='type') mState.type=val; else mState.sec=val;
  btn.closest('.chips-row').querySelectorAll('.chip-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function submitModal() {
  const v=document.getElementById('modal-input').value.trim();
  if(!v) return;
  const {state,week,key}=getWeek();
  week.sections[mState.sec][mState.type].push(v);
  state[key]=week; save(state);
  closeModal();
  if(curSec===mState.sec && document.getElementById('screen-section').classList.contains('active')) renderDetail(curSec);
  refreshHome();
  showToast('✅ تم الحفظ');
}

function closeModal(e) {
  if(!e||e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
}

let qStep=0, qAnswers={};

function startReview() {
  // Resume from saved progress if exists
  const {week}=getWeek();
  if(week.reviewDraft && Object.keys(week.reviewDraft).length>0) {
    qAnswers = {...week.reviewDraft};
    qStep = week.reviewDraftStep||0;
    showToast('↩ متابعة من حيث توقفت');
  } else {
    qStep=0; qAnswers={};
  }
  showScreen('screen-review'); setNav('nav-rev');
  renderQ();
}

function renderQ() {
  const q=QS[qStep], total=QS.length;
  // progress
  document.getElementById('prog-bar').innerHTML=
    Array.from({length:total},(_,i)=>`<div class="prog-dot ${i<qStep?'done':''}"></div>`).join('');
  document.getElementById('btn-prev').style.display=qStep===0?'none':'block';
  document.getElementById('btn-next').textContent=qStep===total-1?'إنهاء الجلسة ✓':'التالي ›';
  const saved=qAnswers[q.id]||'';
  let inner=`<div class="q-num">السؤال ${toAr(qStep+1)} من ${toAr(total)}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-hint">${q.hint}</div>`;
  if(q.type==='scale10') {
    inner+=`<div class="scale-row">${Array.from({length:10},(_,i)=>`<button class="scale-btn ${saved==i+1?'sel':''}"
      onclick="setA('${q.id}',${i+1});this.closest('.scale-row').querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">${toAr(i+1)}</button>`).join('')}</div>`;
  } else if(q.type==='textarea') {
    inner+=`<textarea class="review-ta" placeholder="${q.ph||''}" oninput="setA('${q.id}',this.value)">${esc(saved)}</textarea>`;
  } else if(q.type==='triangle') {
    const opts=[
      {v:'no',l:'✅ لا، لم أكن في Triangle'},
      {v:'victim',l:'😔 Victim — شعرت أن لا أحد يقدّر جهودي'},
      {v:'rescuer',l:'🤝 Rescuer — أخذت مهام الآخرين على نفسي'},
      {v:'persecutor',l:'⚠️ Persecutor — حكمت بقسوة على نفسي أو الآخرين'}
    ];
    inner+=`<div class="tri-opts">${opts.map(o=>`<button class="tri-opt ${saved===o.v?'sel':''}"
      onclick="setA('${q.id}','${o.v}');this.closest('.tri-opts').querySelectorAll('.tri-opt').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">${o.l}</button>`).join('')}</div>`;
  } else if(q.type==='compare') {
    const opts=['أعلى ⬆️','نفس ➡️','أقل ⬇️'];
    inner+=`<div class="scale-row" style="margin-bottom:10px">${opts.map(o=>`<button class="scale-btn ${saved===o?'sel':''}" style="width:auto;padding:0 14px"
      onclick="setA('${q.id}','${o}');this.closest('.scale-row').querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">${o}</button>`).join('')}</div>
      <textarea class="review-ta" placeholder="لماذا؟ جملة واحدة..." oninput="setA('${q.id}_note',this.value)">${esc(qAnswers[q.id+'_note']||'')}</textarea>`;
  }
  document.getElementById('q-card').innerHTML=`<div class="q-card">${inner}</div>`;
}

function setA(id,v){
  qAnswers[id]=v;
  // Auto-save draft
  const {state,week,key}=getWeek();
  week.reviewDraft={...qAnswers};
  week.reviewDraftStep=qStep;
  state[key]=week; save(state);
}
function revNext(){if(qStep<QS.length-1){qStep++;renderQ();}else{finishReview();}}
function revPrev(){if(qStep>0){qStep--;renderQ();}}

function finishReview(isEdit) {
  const {state,week,key}=getWeek();
  const now=new Date().toISOString();
  const wasCompleted=!!week.completedAt;
  // Preserve original completion date if editing
  const originalCompletedAt = week.completedAt || now;
  week.review={...qAnswers, completedAt:originalCompletedAt};
  week.completedAt=originalCompletedAt;
  week.reviewDraft=null; week.reviewDraftStep=0;
  // Edit log
  if(isEdit||wasCompleted) {
    if(!week.editLog) week.editLog=[];
    week.editLog.push({editedAt:now, by:'user'});
    week.lastEditedAt=now;
  }
  // Track review log
  if(!state._reviewLog) state._reviewLog=[];
  if(!wasCompleted) {
    state._reviewLog.push({date:now, weekKey:key});
    if(state._lastReview!==key) state._streak=(state._streak||0)+1;
    state._lastReview=key;
  }
  state[key]=week; save(state);
  renderSummary(week);
}

  const emojis=['','😓','😐','🙂','💪','🚀'];
  const totalDone=SECTIONS.reduce((a,s)=>a+(week.sections[s.id]?.done?.length||0),0);

  let h=`<div class="sum-header"><div class="sum-emoji">${emojis[Math.round(avg)]||'✅'}</div>
    <h2>جلسة مكتملة</h2><p>${weekLabel()}</p></div>
    <div class="scores-grid">`;
  SECTIONS.filter(s=>week.sections[s.id]?.score).forEach(s=>{
    const sc=week.sections[s.id].score;
    h+=`<div class="sc-card"><span class="sc-icon">${s.icon}</span><span class="sc-label">${s.label}</span>
      <span class="sc-score" style="color:${SCORE_COLORS[sc]}">${toAr(sc)}/٥</span></div>`;
  });

  <div class="sum-block"><div class="sum-block-lbl">📊 الأسبوع بالأرقام</div>
    <div class="sum-block-text">✅ ${toAr(totalDone)} منجز · 🔴 ${toAr(totalPend)} متأخر للأسبوع القادم · 🔥 ${toAr(load()._streak||0)} أسبوع متواصل</div>
  </div>`;
  if(week.review?.top_win) h+=`<div class="sum-block"><div class="sum-block-lbl">⚡ الإنجاز الأبرز</div><div class="sum-block-text">${esc(week.review.top_win)}</div></div>`;
  if(week.review?.hold_back) h+=`<div class="sum-block"><div class="sum-block-lbl">🔍 نقطة التراجع — للأسبوع القادم</div><div class="sum-block-text">${esc(week.review.hold_back)}</div></div>`;

  h+=`<div style="height:10px"></div>
  <button class="export-btn" onclick="exportData()">⬆️ تصدير JSON — احفظه في iCloud</button>
  <button class="done-btn" onclick="showScreen('screen-home');setNav('nav-home')">العودة للرئيسية ✓</button>
  <div style="height:16px"></div>`;
  document.getElementById('sum-content').innerHTML=h;

  </div>`;

  if(!weeks.length){cont.innerHTML=h+`<div class="empty-state" style="padding:40px 20px"><div class="empty-icon">📅</div>لا يوجد سجل بعد</div>`;return;}

  weeks.forEach(([key,week])=>{

    <!-- ── Week detail header ── -->

function exportData() {
  const state=load();
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`rayan_weekly_${new Date().toISOString().split('T')[0]}.json`;
  a.click(); URL.revokeObjectURL(url);
  const s=load(); s._lastExport=new Date().toISOString(); save(s);
  showToast('✅ تم التصدير — احفظه في iCloud Drive');
}

function triggerImport(){document.getElementById('import-file').click();}

function importData(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e) {
    try {
      const inc=JSON.parse(e.target.result);
      const cur=load(); const merged={...cur};
      let added=0, updated=0;
      Object.entries(inc).forEach(([k,v])=>{
        if(k.startsWith('20')&&k.includes('-W')) {
          if(!cur[k]){merged[k]=v;added++;}
          else {
            const cD=SECTIONS.reduce((a,s)=>a+(cur[k]?.sections?.[s.id]?.done?.length||0),0);
            const iD=SECTIONS.reduce((a,s)=>a+(v?.sections?.[s.id]?.done?.length||0),0);
            if(iD>cD||(!cur[k].completedAt&&v.completedAt)){merged[k]=v;updated++;}
          }
        } else if(k==='_streak') merged._streak=Math.max(cur._streak||0,inc._streak||0);
      });
      save(merged); refreshHome();
      showToast('✅ دمج ناجح — '+toAr(added)+' جديد · '+toAr(updated)+' محدّث');
    } catch(err){showToast('❌ ملف غير صالح');}
    event.target.value='';
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// SORT MODE — Drag & Drop + Touch
// ═══════════════════════════════════════════
let _dragIdx = null;
let _dragType = null;
let _dragSec = null;
let _touchEl = null;
let _touchClone = null;
let _touchStartY = 0;

function toggleSort(sec, type) {
  const modeKey = type === 'pending' ? sec : sec + '_followup';
  if (window._sortMode === modeKey) {
    window._sortMode = null;
  } else {
    window._sortMode = modeKey;
  }
  renderDetail(sec);
}

// ── Mouse/Desktop drag ──
function dragStart(e) {
  _dragIdx  = parseInt(e.currentTarget.dataset.idx);
  _dragType = e.currentTarget.dataset.type;
  _dragSec  = e.currentTarget.dataset.sec;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const target = e.currentTarget;
  target.classList.add('drag-over');
}

function dragDrop(e) {
  e.preventDefault();
  const toIdx = parseInt(e.currentTarget.dataset.idx);
  if (_dragIdx === null || _dragIdx === toIdx) return;
  reorderItems(_dragSec, _dragType, _dragIdx, toIdx);
}

function dragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  _dragIdx = null;
}

// ── Touch drag (iOS) ──
function touchStart(e) {
  const el = e.currentTarget;
  _touchEl = el;
  _dragIdx  = parseInt(el.dataset.idx);
  _dragType = el.dataset.type;
  _dragSec  = el.dataset.sec;
  _touchStartY = e.touches[0].clientY;

  // Create floating clone
  const rect = el.getBoundingClientRect();
  _touchClone = el.cloneNode(true);
  _touchClone.style.cssText = `
    position:fixed; left:${rect.left}px; top:${rect.top}px;
    width:${rect.width}px; z-index:9999; opacity:.85;
    box-shadow:0 8px 24px rgba(0,0,0,.2); border-radius:10px;
    pointer-events:none; transition:none;
    background:var(--surface); padding:11px 13px;
  `;
  document.body.appendChild(_touchClone);
  el.style.opacity = '0.3';
}

function touchMove(e) {
  e.preventDefault();
  if (!_touchClone) return;
  const touch = e.touches[0];
  const dy = touch.clientY - _touchStartY;
  const rect = _touchEl.getBoundingClientRect();
  _touchClone.style.top = (rect.top + dy) + 'px';

  // Find which item we're hovering over
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const els = document.querySelectorAll(`[data-sec="${_dragSec}"][data-type="${_dragType}"]`);
  els.forEach(el => {
    const r = el.getBoundingClientRect();
    if (touch.clientY >= r.top && touch.clientY <= r.bottom && el !== _touchEl) {
      el.classList.add('drag-over');
    }
  });
}

function touchEnd(e) {
  if (!_touchClone) return;
  _touchClone.remove(); _touchClone = null;
  if (_touchEl) _touchEl.style.opacity = '';

  // Find drop target
  const overEl = document.querySelector('.drag-over');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

  if (overEl) {
    const toIdx = parseInt(overEl.dataset.idx);
    if (_dragIdx !== null && _dragIdx !== toIdx) {
      reorderItems(_dragSec, _dragType, _dragIdx, toIdx);
      return;
    }
  }
  _dragIdx = null; _touchEl = null;
}

function reorderItems(sec, type, fromIdx, toIdx) {
  const {state, week, key} = getWeek();
  const arr = week.sections[sec][type];
  const item = arr.splice(fromIdx, 1)[0];
  arr.splice(toIdx, 0, item);
  state[key] = week;
  save(state);
  renderDetail(sec);
  refreshHome();
}

  const typeLabel={pending:'🔴 كل المتأخرات',done:'✅ كل المنجزات',followup:'👁 كل المتابعات'};

    <div style="display:flex;align-items:center;gap:10px;padding:14px 0 16px;border-bottom:1px solid var(--border);margin-bottom:14px">

      <div style="font-size:16px;font-weight:700">${typeLabel[type]||type}</div>
    </div>`;
  let total=0;
  SECTIONS.forEach(s=>{
    const items=week.sections[s.id]?.[type]||[];
    if(!items.length) return;
    total+=items.length;
    h+=`<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px">${s.icon} ${s.label}</div>`;
    items.forEach((it,i)=>{
      if(type==='done') {
        h+=`<div class="task-item done-item" style="margin-bottom:6px">
          <div class="task-check checked" onclick="undoTask('${s.id}',${i});showAllTasks('${type}')">✓</div>
          <div class="task-text">${esc(it)}</div>
          <button class="task-del" onclick="confirmDelete('${s.id}',${i});showAllTasks('${type}')">🗑</button>
        </div>`;
      } else {
        h+=`<div class="task-item" style="margin-bottom:6px">
          <div class="task-check" onclick="completeTask('${s.id}',${i});showAllTasks('${type}')"></div>
          <div class="task-text">${esc(it)}</div>
          <button class="task-del" onclick="archiveTask('${type}','${s.id}',${i});showAllTasks('${type}')">✓→</button>
        </div>`;
      }
    });
    h+=`</div>`;
  });
  if(!total) h+=`<div class="empty-state" style="padding:40px"><div class="empty-icon">${type==='done'?'📝':'✨'}</div>${type==='done'?'لا يوجد منجزات بعد':'لا يوجد مهام متأخرة'}</div>`;
  h+=`</div>`;
  // Show in history screen (reuse)
  showScreen('screen-history'); setNav('');

// Edit a past week's review answers
function editWeekReview(key) {
  const state=load();
  const week=state[key];
  if(!week) return;
  // Load answers into review session
  qAnswers = week.review ? {...week.review} : {};
  qStep = 0;
  // Override finishReview to mark as edit
  window._editingWeekKey = key;
  showScreen('screen-review'); setNav('nav-rev');
  renderQ();
  showToast('✏️ تعديل المراجعة — سيُسجَّل تاريخ التعديل');
}

// Override revNext for edit mode
const _origRevNext = typeof revNext === 'function' ? revNext : null;
function revNextOrFinish() {
  if(qStep < QS.length-1) { qStep++; renderQ(); }
  else {
    if(window._editingWeekKey) {
      // Save edit to specific week
      const state=load();
      const week=state[window._editingWeekKey];
      const now=new Date().toISOString();
      week.review={...qAnswers, completedAt:week.completedAt||now};
      if(!week.editLog) week.editLog=[];
      week.editLog.push({editedAt:now});
      week.lastEditedAt=now;
      state[window._editingWeekKey]=week;
      save(state);
      window._editingWeekKey=null;
      showToast('✅ تم حفظ التعديل');
      showScreen('screen-history'); setNav('nav-hist');
      renderHistory();
    } else {
      finishReview();
    }
  }
}

function showToastUndo(msg, undoFn, dur) {
  dur=dur||4000;
  let t=document.getElementById('app-toast');
  if(!t){t=document.createElement('div');t.id='app-toast';
    t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1714;color:#fff;padding:11px 16px;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:9999;opacity:0;transition:all .25s;max-width:300px;text-align:center;display:flex;align-items:center;gap:10px;';
    document.body.appendChild(t);}
  t.innerHTML=`<span>${msg}</span><button onclick="(${undoFn.toString()})();showToast('↩ تم الإلغاء')" style="background:none;border:1px solid rgba(255,255,255,.4);color:white;padding:3px 10px;border-radius:6px;font-family:var(--font);font-size:12px;cursor:pointer;white-space:nowrap">تراجع</button>`;

  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},dur);
}

function showToast(msg,dur) {
  dur=dur||3000;
  let t=document.getElementById('app-toast');
  if(!t){t=document.createElement('div');t.id='app-toast';
    t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1714;color:#fff;padding:11px 18px;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:9999;opacity:0;transition:all .25s;max-width:300px;text-align:center;';
    document.body.appendChild(t);}
  t.textContent=msg;
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},dur);
}

// EXPORT REMINDER — Sunday 9am
// ═══════════════════════════════════════════
function checkExportReminder() {
  const now=new Date();
  if(now.getDay()!==0||now.getHours()<9) return;
  const state=load();
  if(state._lastExport) {
    const le=new Date(state._lastExport);
    const sameWk=(d)=>{const j=new Date(d.getFullYear(),0,1);return d.getFullYear()+'-W'+String(Math.ceil(((d-j)/86400000+j.getDay()+1)/7)).padStart(2,'0');};
    if(sameWk(le)===weekKey()) return;
  }
  if(document.getElementById('export-reminder')) return;
  const b=document.createElement('div');
  b.id='export-reminder';
  b.style.cssText='background:#FEF3E2;border:1px solid #B8621A;border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;';
  b.innerHTML='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:17px">☁️</span><div><div style="font-size:13px;font-weight:600;color:#7A3B10">تذكير النسخ الاحتياطي</div><div style="font-size:11px;color:#B8621A">صدّر بياناتك الأسبوعية واحفظها في iCloud</div></div></div><div style="display:flex;gap:5px"><button onclick="exportData();dismissReminder()" style="padding:6px 11px;background:#B8621A;color:white;border:none;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">تصدير</button><button onclick="dismissReminder()" style="padding:6px 9px;background:none;border:none;cursor:pointer;font-size:15px;color:#B8621A">×</button></div>';
  const hc=document.getElementById('home-content');
  if(hc) hc.insertBefore(b,hc.firstChild);
}

function dismissReminder() {
  const b=document.getElementById('export-reminder');
  if(b){b.style.opacity='0';setTimeout(()=>b.remove(),200);}
}
